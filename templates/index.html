<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='js/uplot.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <span class="logo">Network Monitor</span>
        <button class="active" data-page="status">Live Status</button>
        <button data-page="health">Health</button>
        <button data-page="timeline">Timeline</button>
        <button data-page="outages">Outage Log</button>
        <button data-page="errors">Error Log</button>
        <button data-page="speedtests">Speed Tests</button>
        <button data-page="logs">Logs</button>
    </nav>

    <main>
        <!-- Live Status Page -->
        <div id="page-status" class="page active">
            <div id="status-banner" class="status-banner up">Loading...</div>
            <div id="target-cards" class="cards"></div>
            <div class="cards">
                <div class="card" id="dns-card">
                    <div class="label">DNS Resolution</div>
                    <div class="value" id="dns-value">--</div>
                    <div class="meta" id="dns-meta"></div>
                </div>
                <div class="card" id="http-card">
                    <div class="label">HTTP Reachability</div>
                    <div class="value" id="http-value">--</div>
                    <div class="meta" id="http-meta"></div>
                </div>
            </div>
        </div>

        <!-- Health Page -->
        <div id="page-health" class="page">
            <div class="range-selector" id="health-range-selector">
                <button class="active" data-range="24h">24 Hours</button>
                <button data-range="7d">7 Days</button>
                <button data-range="30d">30 Days</button>
            </div>
            <div id="health-cards" class="cards"></div>
        </div>

        <!-- Timeline Page -->
        <div id="page-timeline" class="page">
            <div class="range-selector">
                <button class="active" data-range="24h">24 Hours</button>
                <button data-range="7d">7 Days</button>
                <button data-range="30d">30 Days</button>
            </div>
            <div class="chart-container">
                <div id="latency-chart"></div>
            </div>
            <h3 class="section-label">Packet Loss</h3>
            <div class="chart-container">
                <div id="packet-loss-chart"></div>
            </div>
        </div>

        <!-- Outage Log Page -->
        <div id="page-outages" class="page">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Start</th>
                            <th>End</th>
                            <th>Duration</th>
                            <th>Target</th>
                            <th>Error</th>
                        </tr>
                    </thead>
                    <tbody id="outage-table-body">
                    </tbody>
                </table>
            </div>
            <p id="outage-empty" style="display:none; text-align:center; padding:2rem; color:var(--text-secondary);">
                No outages detected. Your network is looking good!
            </p>
        </div>

        <!-- Error Log Page -->
        <div id="page-errors" class="page">
            <div class="range-selector" id="error-range-selector">
                <button class="active" data-hours="24">24 Hours</button>
                <button data-hours="168">7 Days</button>
                <button data-hours="720">30 Days</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Type</th>
                            <th>Source</th>
                            <th>Error</th>
                        </tr>
                    </thead>
                    <tbody id="error-table-body">
                    </tbody>
                </table>
            </div>
            <p id="error-empty" style="display:none; text-align:center; padding:2rem; color:var(--text-secondary);">
                No errors in this time range.
            </p>
        </div>

        <!-- Speed Tests Page -->
        <div id="page-speedtests" class="page">
            <div class="speedtest-controls">
                <button id="run-speedtest-btn" class="btn-primary">Run Speed Test</button>
                <span id="speedtest-status" class="speedtest-status"></span>
            </div>
            <div class="chart-container">
                <div id="speed-chart"></div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Download</th>
                            <th>Upload</th>
                            <th>Ping</th>
                            <th>Server</th>
                        </tr>
                    </thead>
                    <tbody id="speed-table-body">
                    </tbody>
                </table>
            </div>
        </div>
        <!-- Logs Page -->
        <div id="page-logs" class="page">
            <div class="log-controls">
                <div class="range-selector" id="log-line-selector">
                    <button class="active" data-lines="100">100 lines</button>
                    <button data-lines="200">200 lines</button>
                    <button data-lines="500">500 lines</button>
                </div>
                <button id="copy-logs-btn" class="btn-primary">Copy to Clipboard</button>
            </div>
            <div class="log-container">
                <pre id="log-output"></pre>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/uplot.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
